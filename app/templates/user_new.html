<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增用户</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>方圆订单系统</h2>
        <nav>
            <a class="nav-link" href="/dashboard">工作台</a>
            <a class="nav-link" href="/orders">订单列表</a>
            <a class="nav-link" href="/orders/new">新建订单</a>
            <a class="nav-link" href="/print-jobs">打印队列</a>
            <a class="nav-link" href="/showcase">货物展示</a>
            <a class="nav-link" href="/showcase/manage">展示管理</a>
            <a class="nav-link active" href="/users">用户管理</a>
            <a class="nav-link" href="/logout">退出登录</a>
        </nav>
    </aside>

    <main class="content">
        <div class="page-header">
            <div>
                <h1>新增用户</h1>
            </div>
        </div>

        <div class="card">
            {% if error %}
            <p class="error-text">{{ error }}</p>
            {% endif %}

            <form action="/users/new" method="post" class="form-grid">
                <div>
                    <label>用户名</label>
                    <input type="text" name="username" required>
                </div>

                <div>
                    <label>是否管理员</label>
                    <select name="is_admin">
                        <option value="false" selected>否</option>
                        <option value="true">是</option>
                    </select>
                </div>

                <div>
                    <label>密码</label>
                    <input type="password" name="password" required>
                </div>

                <div>
                    <label>确认密码</label>
                    <input type="password" name="confirm_password" required>
                </div>

                <div class="full-width">
                    <button class="btn-primary" type="submit" onclick="return confirm('确认创建该用户？');">创建用户</button>
                    <a class="btn-secondary" href="/users">返回列表</a>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
