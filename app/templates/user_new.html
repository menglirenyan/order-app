{% extends "layouts/admin.html" %}
{% block title %}新增用户{% endblock %}
{% block page_header %}<div class="page-header"><div><h1>新增用户</h1></div></div>{% endblock %}
{% block content %}
<div class="card form-page-card">
    {% if error %}<p class="error-text" role="alert">{{ error }}</p>{% endif %}
    <form action="/users/new" method="post" class="form-grid" data-confirm="确认创建该用户？">
        <div><label for="new-username">用户名 <span class="required-star">*</span></label><input type="text" name="username" id="new-username" autocomplete="username" required autofocus></div>
        <div><label for="new-admin">用户权限</label><select name="is_admin" id="new-admin"><option value="false" selected>普通用户</option><option value="true">管理员</option></select></div>
        <div><label for="new-password">密码 <span class="required-star">*</span></label><input type="password" name="password" id="new-password" autocomplete="new-password" required></div>
        <div><label for="new-confirm-password">确认密码 <span class="required-star">*</span></label><input type="password" name="confirm_password" id="new-confirm-password" autocomplete="new-password" required></div>
        <div class="full-width form-grid-actions"><button class="btn-primary" type="submit">创建用户</button><a class="btn-secondary" href="/users">取消</a></div>
    </form>
</div>
{% endblock %}
