{% extends "layouts/admin.html" %}
{% block title %}打印设置{% endblock %}
{% block page_header %}
<div class="page-header">
    <div><h1>打印设置</h1><p>设置 A4 出货单的标题、底部说明和签字栏。三层复写纸只打印一次。</p></div>
    <div class="page-actions"><a class="btn-secondary" href="/orders">返回订单列表</a></div>
</div>
{% endblock %}
{% block content %}
<section class="card form-page-card">
    <h2 class="section-title">A4 出货单文案</h2>
    <form action="/print-settings/delivery-config" method="post" class="settings-form delivery-config-form">
        <label><span>标题</span><input type="text" name="title" value="{{ print_config.title }}" required></label>
        <textarea name="copies_text" hidden>{{ copies_text }}</textarea>
        <label><span>默认单位</span><input type="text" name="unit" value="{{ print_config.unit }}" required></label>
        <label><span>底部说明（一行一条）</span><textarea name="footer_lines_text" rows="6" required>{{ footer_lines_text }}</textarea></label>
        <div class="settings-grid compact-settings-grid">
            <label><span>送货人标签</span><input type="text" name="delivery_person_label" value="{{ print_config.delivery_person_label }}" required></label>
            <label><span>送货人默认值</span><input type="text" name="delivery_person_value" value="{{ print_config.delivery_person_value }}"></label>
            <label><span>收货签字标签</span><input type="text" name="receiver_sign_label" value="{{ print_config.receiver_sign_label }}" required></label>
        </div>
        <div class="form-grid-actions"><button class="btn-primary" type="submit">保存打印文案</button></div>
    </form>
</section>
{% endblock %}
