{% extends "layouts/admin.html" %}
{% block title %}编辑用户{% endblock %}
{% block page_header %}<div class="page-header"><div><h1>编辑用户</h1><p>当前用户：{{ user_obj.username }}</p></div></div>{% endblock %}
{% block content %}
<div class="card form-page-card">
    {% if error %}<p class="error-text" role="alert">{{ error }}</p>{% endif %}
    <form action="/users/{{ user_obj.id }}/edit" method="post" class="form-grid" data-confirm="确认保存该用户修改？">
        <div><label for="edit-username">用户名 <span class="required-star">*</span></label><input type="text" name="username" id="edit-username" value="{{ user_obj.username }}" autocomplete="username" required></div>
        <div><label for="edit-active">账号状态</label><select name="is_active" id="edit-active"><option value="true" {% if user_obj.is_active %}selected{% endif %}>启用</option><option value="false" {% if not user_obj.is_active %}selected{% endif %}>停用</option></select></div>
        <div><label for="edit-admin">用户权限</label><select name="is_admin" id="edit-admin"><option value="false" {% if not user_obj.is_admin %}selected{% endif %}>普通用户</option><option value="true" {% if user_obj.is_admin %}selected{% endif %}>管理员</option></select></div>
        <div><label for="edit-password">新密码（留空则不改）</label><input type="password" name="new_password" id="edit-password" autocomplete="new-password"></div>
        <div><label for="edit-confirm-password">确认新密码</label><input type="password" name="confirm_password" id="edit-confirm-password" autocomplete="new-password"></div>
        <div class="full-width form-grid-actions"><button class="btn-primary" type="submit">保存修改</button><a class="btn-secondary" href="/users">取消</a></div>
    </form>
</div>
{% endblock %}
