<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>打印预览</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/mobile_ui.js" defer></script>
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>方圆订单系统</h2>
        <nav>
            <a class="nav-link" href="/dashboard">工作台</a>
            <a class="nav-link" href="/orders">订单列表</a>
            <a class="nav-link" href="/orders/new">新建订单</a>
            <a class="nav-link" href="/print-jobs">打印队列</a>
            <a class="nav-link" href="/showcase">货物展示</a>
            <a class="nav-link" href="/showcase/manage">展示管理</a>
            {% if current_user.is_admin %}
            <a class="nav-link" href="/users">用户管理</a>
            {% endif %}
            <a class="nav-link" href="/logout">退出登录</a>
        </nav>
    </aside>

    <main class="content">
        <div class="page-header">
            <div>
                <h1>打印预览</h1>
                <p>{{ order.order_no }} · {{ template_label }}</p>
            </div>
            <div class="page-actions">
                <a class="btn-secondary" href="/orders/{{ order.id }}">返回订单</a>
                <form action="/orders/{{ order.id }}/print" method="post" onsubmit="return confirm('确认发送到打印队列？');">
                    <input type="hidden" name="print_template" value="{{ template_key }}">
                    <input type="hidden" name="return_to" value="/orders/{{ order.id }}">
                    <button class="btn-primary" type="submit">按此模板打印</button>
                </form>
            </div>
        </div>

        <div class="card print-template-switcher">
            <form method="get" action="/orders/{{ order.id }}/print-preview" class="inline-picker-form">
                <select name="print_template">
                    {% for key, item in print_templates.items() %}
                    <option value="{{ key }}" {% if template_key == key %}selected{% endif %}>{{ item.label }} · {{ item.description }}</option>
                    {% endfor %}
                </select>
                <button class="btn-secondary" type="submit">切换预览</button>
            </form>
        </div>

        <div class="card print-preview-card">
            <pre>{{ preview_text }}</pre>
        </div>
    </main>
</div>
</body>
</html>
