<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>初始化账号</title>
</head>
<body>
    <h1>初始化系统账号</h1>
    <p>当前系统还没有任何可登录账号，请先创建第一个账号。</p>

    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="/init-user" method="post">
        <p>
            <label>用户名：</label><br>
            <input type="text" name="username" required>
        </p>

        <p>
            <label>密码：</label><br>
            <input type="password" name="password" required>
        </p>

        <p>
            <label>确认密码：</label><br>
            <input type="password" name="confirm_password" required>
        </p>

        <p>
            <button type="submit">创建账号</button>
        </p>
    </form>
</body>
</html>
