{% extends "layouts/auth.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-brand"><span>方</span><strong>方圆订单系统</strong></div>
        <h1>登录工作台</h1>
        <p>订单、欠款与出货状态集中管理</p>
        {% if error %}<p class="error-text" role="alert">{{ error }}</p>{% endif %}
        <form action="/login" method="post" class="auth-form">
            <label for="login-username">用户名</label>
            <input type="text" name="username" id="login-username" autocomplete="username" required autofocus>
            <label for="login-password">密码</label>
            <input type="password" name="password" id="login-password" autocomplete="current-password" required>
            <button class="btn-primary" type="submit">登录</button>
        </form>
    </div>
</div>
{% endblock %}
