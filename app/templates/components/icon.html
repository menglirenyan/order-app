{% macro icon(name, class_name="ui-icon") -%}
<svg class="{{ class_name }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    {% if name == "dashboard" %}<path d="M4 13h6V4H4v9Z"/><path d="M14 20h6v-9h-6v9Z"/><path d="M4 20h6v-3H4v3Z"/><path d="M14 7h6V4h-6v3Z"/>
    {% elif name == "orders" %}<path d="M6 3h12v18H6z"/><path d="M9 8h6M9 12h6M9 16h4"/>
    {% elif name == "add" %}<path d="M12 5v14M5 12h14"/>
    {% elif name == "collection" %}<rect x="3" y="4" width="18" height="16" rx="2"/><path d="m7 15 3-3 3 3 2-2 3 3"/><circle cx="9" cy="9" r="1"/>
    {% elif name == "manage" %}<path d="M4 6h16M4 12h16M4 18h16"/><circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/>
    {% elif name == "print" %}<path d="M7 8V3h10v5"/><path d="M6 17H4V9h16v8h-2"/><path d="M7 14h10v7H7z"/><path d="M17 11h.01"/>
    {% elif name == "users" %}<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
    {% elif name == "logout" %}<path d="M10 17l5-5-5-5M15 12H3"/><path d="M15 3h5v18h-5"/>
    {% elif name == "menu" %}<path d="M4 7h16M4 12h16M4 17h16"/>
    {% elif name == "search" %}<circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/>
    {% else %}<circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/>
    {% endif %}
</svg>
{%- endmacro %}
