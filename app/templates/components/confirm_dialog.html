<div class="confirm-dialog" id="confirmDialog" hidden>
    <div class="confirm-dialog-backdrop" data-confirm-cancel></div>
    <section class="confirm-dialog-panel" role="dialog" aria-modal="true" aria-labelledby="confirmDialogTitle">
        <div>
            <h2 id="confirmDialogTitle">确认操作</h2>
            <p id="confirmDialogMessage">请确认继续。</p>
        </div>
        <div class="confirm-dialog-actions">
            <button class="btn-secondary" type="button" data-confirm-cancel>取消</button>
            <button class="btn-danger" type="button" data-confirm-ok>确认</button>
        </div>
    </section>
</div>
